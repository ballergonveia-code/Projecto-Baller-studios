<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔️ Tower Defense - Pixel Art</title>
  <!-- Fonte pixelada -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Tower.css">
</head>
<body>
  <!-- PAINEL SUPERIOR -->
  <header id="topPanel">
    <div class="stat"><span>💰</span> <span id="goldDisplay">100</span></div>
    <div class="stat"><span>🏆</span> <span id="scoreDisplay">0</span></div>
    <div class="stat"><span>⭐</span> <span id="highScoreDisplay">0</span></div>
    <div class="stat"><span>🏰</span> <span id="castleHpDisplay">100/100</span></div>
    <div class="stat"><span>🌊</span> Nv <span id="levelDisplay">1</span> - Wv <span id="waveDisplay">0</span></div>
  </header>

  <!-- ÁREA DO JOGO -->
  <main id="gameArea">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="overlay" class="hidden">
      <div id="overlayContent">
        <h1 id="overlayTitle">Título</h1>
        <p id="overlayMessage">Mensagem</p>
        <button id="overlayBtn">OK</button>
      </div>
    </div>
  </main>

  <!-- PAINEL INFERIOR -->
  <footer id="bottomPanel">
    <div id="buildSection">
      <button data-unit="miner">⛏️ Mineiro (30)</button>
      <button data-unit="soldier">⚔️ Soldado (20)</button>
      <button data-unit="archer">🏹 Arqueiro (35)</button>
      <button data-unit="swordsman">🗡️ Espadachim (50)</button>
      <button data-unit="knight">🛡️ Cavaleiro (80)</button>
      <button data-unit="mage">🧙 Mago (100)</button>
      <button data-unit="giant">👹 Gigante (200)</button>
    </div>
    <div id="upgradeSection">
      <button id="upgradeCastleHp">❤️ Vida+ (50)</button>
      <button id="upgradeCastleDef">🛡️ Defesa+ (40)</button>
      <button id="upgradeRegen">💚 Regeneração (60)</button>
      <button id="upgradeArchers">🏹 Arq.Castelo (70)</button>
    </div>
    <div id="controlSection">
      <button id="startWaveBtn">⚡ Iniciar Wave</button>
      <button id="pauseBtn">⏸️ Pausar</button>
      <button id="restartBtn">🔄 Reiniciar</button>
    </div>
  </footer>

  <script src="Tower.js"></script>
</body>
</html>
